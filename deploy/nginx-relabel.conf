# Nginx reverse proxy para Relabelsystem
# Subdominio: relabel.tmslp-sys.com  ->  Next.js en localhost:3000
#
# Instalar en el VPS como:  /etc/nginx/sites-available/relabel
# Ver deploy/README-nginx.md para los comandos.

server {
    listen 80;
    listen [::]:80;
    server_name relabel.tmslp-sys.com;

    # Sube el limite de subida para el Excel del cliente (~3,732 filas)
    client_max_body_size 25M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
